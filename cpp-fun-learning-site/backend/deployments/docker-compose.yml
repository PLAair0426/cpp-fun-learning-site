services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: cpp-learning-api
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      API_PORT: ${API_PORT:-8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://cppstudy:cppstudy@postgres:5432/cppstudy?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      JUDGE0_URL: ${JUDGE0_URL:-}
      ENABLE_MOCK_JUDGE: ${ENABLE_MOCK_JUDGE:-true}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-cppstudy_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-720}
    ports:
      - "${API_HOST_PORT:-8080}:8080"

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    container_name: cpp-learning-worker
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: development
      WORKER_PORT: ${WORKER_PORT:-8081}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://cppstudy:cppstudy@postgres:5432/cppstudy?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      JUDGE0_URL: ${JUDGE0_URL:-}
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN:-}
      JUDGE0_AUTH_HEADER: ${JUDGE0_AUTH_HEADER:-X-Auth-Token}
      JUDGE0_CPP_LANGUAGE_ID: ${JUDGE0_CPP_LANGUAGE_ID:-54}
      JUDGE0_C_LANGUAGE_ID: ${JUDGE0_C_LANGUAGE_ID:-50}
      ENABLE_MOCK_JUDGE: ${ENABLE_MOCK_JUDGE:-true}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_HEARTBEAT_KEY: ${WORKER_HEARTBEAT_KEY:-cppstudy:worker:heartbeat}
      WORKER_HEARTBEAT_TTL: ${WORKER_HEARTBEAT_TTL:-20s}
      WORKER_HTTP_TIMEOUT: ${WORKER_HTTP_TIMEOUT:-15s}
    ports:
      - "${WORKER_HOST_PORT:-8081}:8081"

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: cpp-learning-web
    depends_on:
      - api
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8080}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"

  postgres:
    image: postgres:17-alpine
    container_name: cpp-learning-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cppstudy}
      POSTGRES_USER: ${POSTGRES_USER:-cppstudy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cppstudy}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: cpp-learning-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
